name: React CI/CD

on:
  push:
    branches:
      - master
      - production

jobs:
  docker_build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ---------------- DEV ----------------
      - name: Build & push DEV (master)
        if: github.ref == 'refs/heads/master'
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            -t ${{ secrets.DOCKER_USERNAME }}/inventory-frontend:dev .
          docker push ${{ secrets.DOCKER_USERNAME }}/inventory-frontend:dev

      # ---------------- PRODUCTION ----------------
      - name: Build & push PROD (production)
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            -t ${{ secrets.DOCKER_USERNAME }}/inventory-frontend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/inventory-frontend:latest


  deploy_prod:
    runs-on: self-hosted
    needs: docker_build

    steps:
      - name: Deploy production frontend
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/inventory-frontend:latest

          docker stop frontend || true
          docker rm frontend || true

          docker run -d \
            --name frontend \
            -p 3001:3001 \
            ${{ secrets.DOCKER_USERNAME }}/inventory-frontend:latest